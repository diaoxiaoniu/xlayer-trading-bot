name: XLayer Trading Bot

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Manual action'
        required: false
        default: 'trade'
  schedule:
    - cron: '*/5 * * * *'

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: |
          curl -sSL https://raw.githubusercontent.com/okx/onchainos-skills/main/install.sh | bash

      - name: Run Trading Bot
        env:
          WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          export WALLET="${{ secrets.WALLET_ADDRESS }}"
          export DISCORD_WEBHOOK="${{ secrets.DISCORD_WEBHOOK_URL }}"
          
          python3 << 'PYEOF'
import json
import os
import subprocess

WEBHOOK = os.environ.get('DISCORD_WEBHOOK', '')

def send_discord(msg):
    if WEBHOOK:
        import urllib.request
        data = json.dumps({"content": msg}).encode('utf-8')
        req = urllib.request.Request(
            WEBHOOK,
            data=data,
            headers={'Content-Type': 'application/json'}
        )
        try:
            urllib.request.urlopen(req)
        except:
            pass

try:
    result = subprocess.run(
        ['onchainos', 'token', 'price-info', '0xfdc4a45a4bf53957b2c73b1ff323d8cbe39118dd', '--chain', 'xlayer'],
        capture_output=True, text=True, timeout=30
    )
    
    data = json.loads(result.stdout)
    
    if data.get('ok') and data.get('data'):
        info = data['data'][0]
        price = float(info.get('price', '0') or '0')
        low_24h = float(info.get('minPrice', '0') or '0')
        high_24h = float(info.get('maxPrice', '0') or '0')
        change_24h = float(info.get('priceChange24H', '0') or '0')
        
        buy_thresh = low_24h * 1.05
        
        msg = f"""📊 XLayer Trading Bot
━━━━━━━━━━━━━━━━━━━━
💰 TITAN: ${price:.4f}
📈 24h: {change_24h:+.2f}%
📉 Range: ${low_24h:.4f} - ${high_24h:.4f}
🎯 Buy: ${buy_thresh:.4f}"""
        
        if price < buy_thresh:
            msg += "\n\n🟢 BUY SIGNAL!"
        else:
            msg += "\n\n🟡 No signal"
        
        print(msg)
        send_discord(msg)
    else:
        print("❌ No data")
        
except Exception as e:
    print(f"❌ Error: {e}")
    send_discord(f"❌ Error: {e}")

PYEOF
