name: XLayer Trading Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: read

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: |
          curl -sSL https://raw.githubusercontent.com/okx/onchainos-skills/main/install.sh | bash

      - name: Get Price & Check Signals
        id: check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          cat > /tmp/trade.py << 'ENDSCRIPT'
import json
import os
import subprocess

WEBHOOK = os.environ.get('DISCORD_WEBHOOK_URL', '')
WALLET = "0x844e815218a78c2009b79ff778350e6cfe816df8"
TOKEN = "0xfdc4a45a4bf53957b2c73b1ff323d8cbe39118dd"  # TITAN

def send_discord(msg):
    if WEBHOOK:
        import urllib.request
        data = json.dumps({"content": msg}).encode('utf-8')
        req = urllib.request.Request(WEBHOOK, data=data, headers={'Content-Type': 'application/json'})
        try:
            urllib.request.urlopen(req)
        except:
            pass

try:
    result = subprocess.run(
        ['onchainos', 'token', 'price-info', TOKEN, '--chain', 'xlayer'],
        capture_output=True, text=True, timeout=30
    )
    
    data = json.loads(result.stdout)
    
    if data.get('ok') and data.get('data'):
        info = data['data'][0]
        price = float(info.get('price', '0') or '0')
        low_24h = float(info.get('minPrice', '0') or '0')
        high_24h = float(info.get('maxPrice', '0') or '0')
        change_24h = float(info.get('priceChange24H', '0') or '0')
        
        buy_thresh = low_24h * 1.05
        tp_price = price * 1.30
        
        msg = f"""📊 XLayer Trading Bot
━━━━━━━━━━━━━━━━━━━━
💰 TITAN: ${price:.4f}
📈 24h: {change_24h:+.2f}%
📉 Range: ${low_24h:.4f} - ${high_24h:.4f}
🎯 Buy Threshold: ${buy_thresh:.4f}
📍 TP Price: ${tp_price:.4f}"""
        
        if price < buy_thresh:
            msg += "\n\n🟢 BUY SIGNAL! Testing swap..."
            
            # Try to get swap quote
            try:
                quote_result = subprocess.run(
                    ['onchainos', 'swap', 'quote',
                     '--from', '0x74b7f16337b8972027f6196a17a631ac6de26d22',  # USDC
                     '--to', TOKEN,
                     '--amount', '5000000',  # 5 USDC
                     '--chain', 'xlayer'],
                    capture_output=True, text=True, timeout=30
                )
                quote_data = json.loads(quote_result.stdout)
                if quote_data.get('ok'):
                    q = quote_data['data'][0]
                    msg += f"\n\n📝 Quote (5 USDC → TITAN):\n"
                    msg += f"   Expected: {q.get('toTokenAmount', 'N/A')} TITAN\n"
                    msg += f"   Price Impact: {q.get('priceImpactPercent', 'N/A')}%\n"
                    msg += f"   Gas Fee: ${q.get('gasFee', 'N/A')}"
            except Exception as e:
                msg += f"\n\n⚠️ Quote error: {e}"
        else:
            msg += "\n\n🟡 No signal"
        
        print(msg)
        send_discord(msg)
    else:
        print("No data")
        
except Exception as e:
    print(f"Error: {e}")
    send_discord(f"Error: {e}")

ENDSCRIPT
          
          python3 /tmp/trade.py
