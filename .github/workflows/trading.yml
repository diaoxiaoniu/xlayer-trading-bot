name: XLayer Trading Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: read

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: curl -sSL https://raw.githubusercontent.com/okx/onchainos-skills/main/install.sh | bash

      - name: Get Price & Execute Swap
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: bash scripts/trading-bot.sh
